name: Bug report
description: Report a problem with ApprovalKit
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please do **not** report security issues here —
        see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I gate a function in client mode, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. docker compose -f docker-compose.local.yml up
        2. Call kit.gate(...)
        3. ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API / backend
        - Worker
        - Python SDK
        - TypeScript SDK
        - MCP server
        - Frontend / dashboard
        - Docs
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - local (default)
        - auth0
        - mixed / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. main @ 5ffca5c
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
