name: Feature request
description: Suggest an idea or improvement for ApprovalKit
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like ApprovalKit to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Approval channel / providers
        - Execution modes (client/server)
        - Rule engine / policy
        - SDK (Python / TypeScript)
        - MCP server
        - Frontend / dashboard
        - Docs
        - Other
    validations:
      required: true
