name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: approvalkit
          POSTGRES_USER: approvalkit
          POSTGRES_PASSWORD: approvalkit
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U approvalkit -d approvalkit"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://approvalkit:approvalkit@localhost:5432/approvalkit
      REDIS_URL: redis://localhost:6379/0
      HMAC_SECRET: ci-hmac-secret
      ENVIRONMENT: development
      APPROVAL_PROVIDER: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
      - name: Run tests
        run: pytest -q

  python-sdk:
    name: Python SDK import + MCP entrypoint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SDK
        run: pip install ./sdk
      - name: Smoke-import
        run: |
          python -c "from approvalkit import ApprovalKit, ApprovalDenied; ApprovalKit(execution_mode='client'); print('python sdk ok')"
          python -c "import approvalkit.mcp_server as m; assert hasattr(m, 'main'); print('mcp ok')"

  ts-sdk:
    name: TypeScript SDK build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Build
        run: npm run build

  frontend:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
