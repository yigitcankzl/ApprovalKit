# Override file that enables NVIDIA GPU acceleration for Ollama.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Requires:
#   - NVIDIA GPU
#   - nvidia-container-toolkit installed and Docker runtime configured
#
# If these are not present, omit this file and Ollama will run on CPU.
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
