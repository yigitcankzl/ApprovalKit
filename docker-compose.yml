version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./api:/app/api

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A api.worker.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: approvalkit
      POSTGRES_USER: approvalkit
      POSTGRES_PASSWORD: approvalkit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local
    depends_on:
      - api

volumes:
  pgdata:
