services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: approvalkit
      POSTGRES_USER: approvalkit
      POSTGRES_PASSWORD: approvalkit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approvalkit -d approvalkit"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    image: hashicorp/vault:latest
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: approvalkit-dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: >
      sh -c "cd /app && PYTHONPATH=/app python -B -c \"
      import asyncio, os
      from sqlalchemy.ext.asyncio import create_async_engine
      from api.database import Base
      from api.models.workspace import Workspace
      from api.models.connection import ServiceConnection
      from api.models.approver import Approver
      from api.models.rule import Rule, RuleApprover
      from api.models.approval_job import ApprovalJob, AuditLog
      async def main():
          engine = create_async_engine(os.environ['DATABASE_URL'])
          async with engine.begin() as conn:
              await conn.run_sync(Base.metadata.create_all)
          await engine.dispose()
      asyncio.run(main())
      \" && cd /app/api && PYTHONPATH=/app python -B -m alembic stamp head"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./scripts:/app/scripts

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./scripts:/app/scripts
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A api.worker.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./api:/app/api
      - ./scripts:/app/scripts
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
