# Healthcare AI Agent — ApprovalKit Rule Definitions (Token Vault First)
# ======================================================================
# Every connection maps to a real Token Vault service.
# After approval, Auth0 Token Vault executes the action using stored credentials.
# The agent NEVER holds any API keys or OAuth tokens.

connections:
  - slug: gmail-prod
    name: Gmail (Token Vault)
    service: google
    actions:
      - action: send_email
        description: Send email via Gmail API (prescriptions, notifications, referrals)

  - slug: stripe-prod
    name: Stripe (Token Vault)
    service: stripe
    actions:
      - action: charge
        description: Process payment via Stripe API (billing, invoices)

  - slug: gdrive-prod
    name: Google Drive (Token Vault)
    service: google
    actions:
      - action: share_file
        description: Share files via Google Drive API (patient records, HIPAA)

  - slug: slack-prod
    name: Slack (Token Vault)
    service: slack
    actions:
      - action: send_message
        description: Post message via Slack API (alerts, team notifications)

  - slug: gcal-prod
    name: Google Calendar (Token Vault)
    service: google
    actions:
      - action: create_event
        description: Create event via Google Calendar API (appointments)

agent:
  name: Healthcare AI Agent
  description: "HIPAA-compliant hospital management — all actions execute via Auth0 Token Vault"
  icon: hospital
  scenarios:
    - title: "Routine Prescription — Metformin 500mg"
      connection: gmail-prod
      action: send_email
      params:
        type: prescription
        medication_name: Metformin
        dosage: 500mg
        patient_mrn: MRN-00001
        patient_name: Maria Garcia
        doctor_name: Dr. Christopher Lee
        is_controlled: false

    - title: "Controlled Substance — Adderall 20mg (Schedule II)"
      connection: gmail-prod
      action: send_email
      params:
        type: controlled_prescription
        medication_name: Adderall
        dosage: 20mg
        patient_mrn: MRN-00002
        patient_name: James Wilson
        doctor_name: Dr. Richard Anderson
        is_controlled: true
        schedule_class: "II"

    - title: "Large Billing — $15,000 Surgery (step-up)"
      connection: stripe-prod
      action: charge
      params:
        type: medical_billing
        amount_usd: 15000
        description: Cardiac catheterization procedure
        patient_name: Robert Taylor
        customer: robert.taylor@patient.medcore.com

    - title: "External Referral — Share Records via Drive"
      connection: gdrive-prod
      action: share_file
      params:
        type: external_referral
        patient_mrn: MRN-00001
        patient_name: Maria Garcia
        clinic_name: Metro Cardiology Associates
        file_name: Patient_MRN-00001_Records.pdf

    - title: "Emergency Access — 2min timeout"
      connection: gmail-prod
      action: send_email
      params:
        type: emergency_access
        patient_mrn: MRN-00010
        patient_name: Emergency Patient
        reason: Unconscious patient, need allergy info
        is_emergency: true

approvers:
  - name: Dr. Robert Chen (CMO)
    email: dr.robert.chen@medcore-hospital.com
    role: cmo
  - name: Dr. Christopher Lee
    email: dr.christopher.lee@medcore-hospital.com
    role: internal_medicine
  - name: Dr. Richard Anderson
    email: dr.richard.anderson@medcore-hospital.com
    role: psychiatry
  - name: Michael Torres (Pharmacy Lead)
    email: michael.torres@medcore-hospital.com
    role: pharmacy_lead
  - name: Henry Brooks (IT Admin)
    email: henry.brooks@medcore-hospital.com
    role: it_admin
  - name: Jack Bennett (Finance Manager)
    email: jack.bennett@medcore-hospital.com
    role: finance_manager
  - name: Leonard Diaz (Security Officer)
    email: leonard.diaz@medcore-hospital.com
    role: security_officer

rules:
  # ── Prescriptions (Gmail — Token Vault sends to pharmacy) ─────────
  - name: Routine Prescription
    connection: gmail-prod
    action: send_email
    conditions:
      - field: type
        operator: eq
        value: prescription
    model: specific
    approvers: [internal_medicine]
    timeout_seconds: 300
    context_template: "Rx {{medication_name}} {{dosage}} for {{patient_name}} ({{patient_mrn}})"
    priority: 10

  - name: Controlled Substance
    connection: gmail-prod
    action: send_email
    conditions:
      - field: type
        operator: eq
        value: controlled_prescription
    model: sequential
    approvers: [internal_medicine, pharmacy_lead]
    timeout_seconds: 600
    context_template: "CONTROLLED {{medication_name}} ({{schedule_class}}) for {{patient_name}}"
    priority: 20

  - name: Dose Change
    connection: gmail-prod
    action: send_email
    conditions:
      - field: type
        operator: eq
        value: dose_change
    model: all_of_n
    approvers: [internal_medicine, pharmacy_lead, cmo]
    timeout_seconds: 600
    context_template: "Dose: {{medication_name}} {{previous_dosage}} to {{new_dosage}} for {{patient_name}}"
    priority: 15

  # ── Emergency (Gmail — urgent notification) ───────────────────────
  - name: Emergency Access
    connection: gmail-prod
    action: send_email
    conditions:
      - field: type
        operator: eq
        value: emergency_access
    model: any_one
    approvers: [internal_medicine, cmo]
    timeout_seconds: 120
    context_template: "EMERGENCY {{patient_mrn}} — {{reason}}"
    priority: 50

  # ── Insurance Appeal (Gmail) ──────────────────────────────────────
  - name: Insurance Appeal
    connection: gmail-prod
    action: send_email
    conditions:
      - field: type
        operator: eq
        value: insurance_appeal
    model: all_of_n
    approvers: [internal_medicine, finance_manager]
    timeout_seconds: 900
    context_template: "Appeal {{invoice_number}} ${{amount_usd}} for {{patient_name}}"
    priority: 10

  # ── Access Change (Gmail — IT notification) ───────────────────────
  - name: Staff Access Change
    connection: gmail-prod
    action: send_email
    conditions:
      - field: type
        operator: eq
        value: access_change
    model: specific
    approvers: [it_admin]
    timeout_seconds: 600
    step_up_model: all_of_n
    step_up_conditions:
      - field: requested_access_level
        operator: eq
        value: medication_system
    context_template: "Access: {{employee_name}} {{current_access_level}} to {{requested_access_level}}"
    priority: 5

  # ── Billing (Stripe — Token Vault charges) ────────────────────────
  - name: Medical Billing Medium
    connection: stripe-prod
    action: charge
    conditions:
      - field: type
        operator: eq
        value: medical_billing
      - field: amount_usd
        operator: gte
        value: 500
      - field: amount_usd
        operator: lt
        value: 10000
    model: specific
    approvers: [finance_manager]
    timeout_seconds: 600
    context_template: "Billing ${{amount_usd}} — {{description}} for {{patient_name}}"
    priority: 10

  - name: Medical Billing Large (Step-up)
    connection: stripe-prod
    action: charge
    conditions:
      - field: type
        operator: eq
        value: medical_billing
      - field: amount_usd
        operator: gte
        value: 10000
    model: all_of_n
    approvers: [finance_manager, cmo]
    timeout_seconds: 900
    context_template: "LARGE ${{amount_usd}} — {{description}} for {{patient_name}}"
    priority: 20

  # ── HIPAA Data Sharing (Google Drive — Token Vault shares) ────────
  - name: External Referral
    connection: gdrive-prod
    action: share_file
    conditions:
      - field: type
        operator: eq
        value: external_referral
    model: specific
    approvers: [internal_medicine]
    timeout_seconds: 600
    context_template: "Share {{patient_mrn}} records with {{clinic_name}}"
    priority: 10

  - name: Insurance Data Request
    connection: gdrive-prod
    action: share_file
    conditions:
      - field: type
        operator: eq
        value: insurance_data
    model: all_of_n
    approvers: [internal_medicine, cmo]
    timeout_seconds: 900
    partial_approval: true
    context_template: "Insurance data {{patient_mrn}} to {{insurance_name}}"
    priority: 15

  - name: Research Data Export
    connection: gdrive-prod
    action: share_file
    conditions:
      - field: type
        operator: eq
        value: research_export
    model: sequential
    approvers: [cmo, internal_medicine]
    timeout_seconds: 900
    context_template: "Research export {{patient_count}} patients to {{research_entity}}"
    priority: 20

  # ── Security (Slack — Token Vault posts alert) ────────────────────
  - name: Security Breach Freeze
    connection: slack-prod
    action: send_message
    conditions:
      - field: type
        operator: eq
        value: security_freeze
    model: all_of_n
    approvers: [security_officer, cmo]
    timeout_seconds: 300
    context_template: "SECURITY BREACH — {{reason}}"
    priority: 50
